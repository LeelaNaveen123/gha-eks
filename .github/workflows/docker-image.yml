name: Kubernetes CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docker image
        run: docker build -t leelanaveen123/pyapp:${GITHUB_SHA::7} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: docker push leelanaveen123/pyapp:${GITHUB_SHA::7}

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update deployment.yml with latest docker tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          yq -i '.spec.template.spec.containers[0].image = "leelanaveen123/pyapp:'"$SHORT_SHA"'"' ./k8s/pyapp-deployment.yml

      - name: Commit deployment file changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/pyapp-deployment.yml
          git commit -m "docker tag updated by GHA" || echo "No changes to commit"

          git push
